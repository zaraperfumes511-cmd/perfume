<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Storeify Watches</title>
    <meta name="description" content="Admin login for Storeify Watches">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/admin.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⌚</text></svg>">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo">
                    <img src="../logo2.jpeg" alt="Storeify Logo" class="logo-icon" style="width: 40px; height: 40px; object-fit: cover; border-radius: 50%; background: transparent; box-shadow: none;">
                </div>
                <h1>Admin Login</h1>
                <!-- 
                    HOW THIS IS SECURE:
                    Instead of comparing a password stored in a JS file (visible to everyone),
                    we now send the credentials directly to Appwrite's servers over HTTPS.
                    Appwrite verifies them. If correct, Appwrite creates a secure,
                    encrypted Session Cookie in your browser. We never store the password anywhere.
                -->
                <p>Sign in with your Appwrite admin account</p>
            </div>
            
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter admin email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter admin password" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="login-btn">
                    <span>Login</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </form>
            
            <div id="login-error" class="login-error" style="display: none;">
                Login failed.
            </div>
            
            <div class="login-footer">
                <a href="../index.html">← Back to Store</a>
            </div>
        </div>
    </div>

    <!-- 
        STEP 1: Load the official Appwrite Web SDK from CDN.
        This gives us the Client, Account, Databases, and Storage classes.
        This is NOT a secret. It's just a library, like jQuery.
    -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@16.0.2"></script>

    <!-- STEP 2: Load our config (no secrets in here anymore!) -->
    <script src="../config/config.js"></script>

    <!-- STEP 3: Load our secure Appwrite module -->
    <script src="../js/appwrite.js"></script>

    <script>
        // Check if admin is already logged in.
        // HOW IT WORKS: We call appwriteDB.getCurrentUser() which asks Appwrite
        // "Hey, is there an active session cookie in this browser?"
        // If yes, it returns the user object. If no, it returns null.
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const user = await appwriteDB.getCurrentUser();
                if (user) {
                    // Already logged in! Redirect to dashboard.
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                // 401 here is NORMAL — no active session yet, stay on login page.
            }
        });

        // Handle login form submission
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');
            const loginBtn = document.getElementById('login-btn');

            errorEl.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.querySelector('span').textContent = 'Signing in...';

            try {
                // HOW IT WORKS:
                // 1. This sends the email + password to Appwrite servers (over HTTPS).
                // 2. Appwrite verifies the credentials against its user database.
                // 3. If correct, Appwrite creates a session and sets a secure
                //    'a_session_...' cookie in the browser automatically.
                // 4. You never see or store the password — Appwrite handles everything.
                await appwriteDB.login(email, password);

                // Redirect to dashboard on successful login
                window.location.href = 'dashboard.html';

            } catch (error) {
                // Login failed (wrong email/password or network error)
                errorEl.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.querySelector('span').textContent = 'Login';
                document.getElementById('password').value = '';
            }
        });
    </script>
</body>
</html>
